[alembic]
# Ubicación de las migraciones
script_location = alembic

# La URL real se inyecta en runtime desde app.core.config.settings
# (ver alembic/env.py) -- así usamos la misma DATABASE_URL que el resto
# de la app (Render en producción, sqlite en CI/tests, .env en local),
# en vez de hardcodear o duplicar la config acá.
# sqlalchemy.url se deja vacío a propósito.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
