services:
  - type: web
    name: omi-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    # Antes no había healthCheckPath -- Render solo chequeaba que el
    # proceso responda algo, sin verificar la DB. Con /health/ready
    # (agregado en esta ronda de hardening), un deploy con
    # DATABASE_URL mal, una migración que falló, o la DB caída nunca
    # recibe tráfico real hasta que efectivamente puede hablar con
    # Postgres -- antes ese deploy roto hubiera pasado el health check
    # igual (que solo devolvía {"status":"ok"} sin tocar nada).
    healthCheckPath: /health/ready
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: omi-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_WEBHOOK_SIGNING_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: PAYMENT_RECEIVE_ADDRESS
        sync: false
      - key: POLYGON_RPC_URL
        sync: false
      - key: BASE_RPC_URL
        sync: false

  - type: worker
    name: omi-payment-listener
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m app.workers.payment_listener"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: omi-db
          property: connectionString
      - key: PAYMENT_RECEIVE_ADDRESS
        sync: false
      - key: POLYGON_RPC_URL
        sync: false
      - key: BASE_RPC_URL
        sync: false

databases:
  - name: omi-db
    plan: free
    databaseName: omi
    user: omi
