name: CI

# Corre en cada push y PR a main. Si algo de esto falla, no se mergea/deploya
# -- ver CHANGELOG.md para entender por qué existe cada test.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend — pytest (validation_engine)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Instalar dependencias
        run: pip install -r requirements-dev.txt

      - name: Correr tests
        run: pytest

  frontend-checks:
    name: Frontend — colores Tailwind + tipos
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        run: npm install

      - name: Chequear colores de Tailwind sin definir
        run: npm run check:colors

      - name: Chequear tipos de TypeScript
        run: npm run check:types
